name: AI Trending Daily Report

on:
  schedule:
    # 每天北京时间早上8点运行（UTC时间0点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发
    inputs:
      date:
        description: '指定报告日期 (YYYY-MM-DD)'
        required: false
        default: ''
      author:
        description: '作者名称'
        required: false
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-report:
    name: Generate AI Trending Report
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv sync
        uv pip install -e .

    - name: Create .env file
      run: |
        cat > .env << EOF
# LLM 配置
MODEL=${{ secrets.MODEL }}
MODEL_LIGHT=${{ secrets.MODEL_LIGHT }}
MODEL_TOOL=${{ secrets.MODEL_TOOL }}
OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
OPENAI_API_BASE=${{ secrets.OPENAI_API_BASE }}
LLM_TEMPERATURE=${{ secrets.LLM_TEMPERATURE || '0.1' }}

# GitHub 配置
GITHUB_TRENDING_TOKEN=${{ secrets.GITHUB_TOKEN }}
GITHUB_REPORT_REPO=${{ github.repository }}

# 新闻 API（可选）
NEWSDATA_API_KEY=${{ secrets.NEWSDATA_API_KEY }}

# 知乎配置（可选）
ZHIHU_COOKIE=${{ secrets.ZHIHU_COOKIE }}

# 运行配置
AUTHOR_NAME=${{ secrets.AUTHOR_NAME || 'AI Trending Bot' }}
CREW_VERBOSE=${{ secrets.CREW_VERBOSE || 'false' }}
MAX_RETRIES=${{ secrets.MAX_RETRIES || '3' }}
REQUEST_TIMEOUT=${{ secrets.REQUEST_TIMEOUT || '30' }}
CREWAI_TRACING_ENABLED=${{ secrets.CREWAI_TRACING_ENABLED || 'false' }}

# 可观测性 — Webhook 通知（可选）
WEBHOOK_URL=${{ secrets.WEBHOOK_URL }}
WEBHOOK_ON_SUCCESS=${{ secrets.WEBHOOK_ON_SUCCESS || 'false' }}

# 微信配置（可选）
WECHAT_APP_ID=${{ secrets.WECHAT_APP_ID }}
WECHAT_APP_SECRET=${{ secrets.WECHAT_APP_SECRET }}
WECHAT_THUMB_MEDIA_ID=${{ secrets.WECHAT_THUMB_MEDIA_ID }}
EOF

    - name: Generate AI Trending Report
      run: |
        # 构建运行参数
        ARGS=""
        if [ -n "${{ github.event.inputs.date }}" ]; then
          ARGS="$ARGS --date ${{ github.event.inputs.date }}"
        fi
        if [ -n "${{ github.event.inputs.author }}" ]; then
          ARGS="$ARGS --author \"${{ github.event.inputs.author }}\""
        fi
        
        # 运行主程序
        uv run python run.py $ARGS

    - name: Commit and push if report generated
      run: |
        # 检查是否有新的报告文件生成
        if git diff --name-only HEAD | grep -q "^reports/.*\.md$"; then
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/
          git commit -m "🤖 AI Trending Report $(date +'%Y-%m-%d')"
          git push
        else
          echo "No new report files to commit"
        fi

    - name: Upload report artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: ai-trending-report
        path: |
          reports/
          logs/
          metrics/
        retention-days: 7