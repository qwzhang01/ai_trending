github_trending_task:
  description: >
    使用 GitHub Trending 工具搜索并分析当天最热门的 AI 开源项目。
    
    你需要分别搜索以下关键词来确保覆盖全面:
    1. 搜索 "AI" 获取综合 AI 项目
    2. 搜索 "LLM" 获取大模型相关项目
    3. 搜索 "AI Agent" 获取 AI Agent 框架项目
    
    从搜索结果中综合筛选出最终的 Top 5 项目。对每个项目请提供:
    - 项目名称和 GitHub 链接
    - 项目简介（一句话说明它是做什么的）
    - Star 数和主要编程语言
    - 为什么它值得关注（技术亮点、应用场景、社区反响等）
    - 适合什么样的开发者或团队使用

    当前日期: {current_date}
  expected_output: >
    一份精简的 Top 5 项目清单（总输出不超过 500 字），每个项目只包含:
    - 名称 + GitHub 链接（一行）
    - 一句话描述（不超过 30 字）
    - Star 数 + 主要编程语言
    - 推荐理由（不超过 50 字）
    按热门程度从高到低排列。不要包含 Forks、协议、主题标签等冗余信息。
  agent: github_researcher

ai_news_task:
  description: >
    使用 AI 新闻工具搜集今天最新、最重要的 AI 行业新闻。
    
    搜索关键词应覆盖: AI, LLM, AI Agent, 大模型, GPT, Claude, Gemini, 开源AI
    
    从搜索结果中筛选出最有价值的新闻，并按以下类别分类:
    1. 🏢 大厂动态 — 头部公司的重要发布和战略变化
    2. 🔬 技术突破 — 新模型、新算法、新架构的发布
    3. 🛠️ 工具与框架 — 新的开发工具和框架更新
    4. 💰 投融资 — 重要的 AI 领域融资和收购事件
    5. 📊 行业趋势 — 政策、市场、应用场景的变化
    
    对每条新闻提供简要分析，说明其行业影响。

    当前日期: {current_date}
  expected_output: >
    一份精简的 8-10 条新闻摘要（总输出不超过 800 字），每条只包含:
    - 标题 + 来源 + 链接（一行）
    - 所属类别（大厂动态/技术突破/工具框架/投融资/行业趋势）
    - 一句话影响分析（不超过 30 字）
    不要大段引用原文，只保留核心信息。
  agent: news_analyst

report_writing_task:
  description: >
    基于前面获取的 GitHub 热门 AI 开源项目和 AI 行业新闻，撰写一份每日 AI 趋势报告。

    ⚠️ 数据规则（最高优先级）:
    - 只能基于上游两个任务（github_trending_task 和 ai_news_task）提供的真实数据撰写
    - 绝对禁止编造项目名称、Star 数、新闻事件、公司动态
    - 所有链接、Star 数、来源必须与上游数据完全一致
    - 上游数据不够就如实反映，不要凑数

    报告结构（不要照搬，根据内容灵活调整）:
    - 开头用 2-3 句话点出今天最值得关注的事，直接说结论，不要铺垫
    - GitHub 热门项目 Top 5：每个项目 2-3 行，说清楚"是什么"和"为什么值得看"，数据要带上
    - 行业动态：直接列条目，标题 + 链接 + 一句话判断，不需要分类标签
    - 结尾用 2-3 个趋势观察收尾，每条一句话，直接说判断

    写作原则:
    - 语气像一个懂行的人在和同行说话，不是在写公众号推文
    - 每句话要有实质内容：具体数据、使用场景、明确判断，三选一
    - 不同项目/新闻用不同的切入角度，不要套同一个句式结构
    - 不用 emoji，不用感叹号堆砌，不用"值得关注"、"不容忽视"这类废话
    - 宁可短，不要注水

    禁止使用的表达（会让文章立刻显得像 AI 生成）:
    - "极具战略意义"、"不可撼动"、"革命性"、"里程碑"
    - "这预示着..."、"将变得至关重要"、"对...来说意义重大"
    - "值得关注的是"、"不难发现"、"由此可见"
    - 对每个项目都用最高级形容词
    - 每条点评都套"定性→背景→预测→启示"四段论

    当前日期: {current_date}
  expected_output: >
    一份 Markdown 格式的 AI 每日趋势报告。
    标题格式：# AI 日报 | {current_date}
    宁可精炼也不注水，每句话都要有实质内容。
    不要包含 ``` 代码块标记，不要使用 emoji。
  agent: report_writer