plan_keywords:
  description: >
    用户主题: {query}
    当前日期: {current_date}

    请输出 3-5 个英文 GitHub 搜索关键词或短语，用于发现近期最有代表性的 AI 开源项目。
    要求：
    1. 关键词必须是英文技术词或英文短语，适合直接用于 GitHub 仓库检索。
    2. 优先覆盖最近 AI 热点，例如 MCP、Agentic workflow、推理/服务、多模态、记忆、评测、推理加速。
    3. 避免过于宽泛的词，如 software、tool、project。
    4. 如果用户主题很宽泛，也要给出更具体的技术关键词。
    5. 不要输出中文关键词。
  expected_output: >
    返回一个符合 GitHubSearchPlan 模型的结构化结果，
    包含 keywords 和 search_focus。
  agent: keyword_planner
