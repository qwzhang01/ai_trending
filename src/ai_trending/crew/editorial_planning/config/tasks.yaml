plan_editorial_task:
  description: >
    # 编辑部选题规划

    当前日期：{current_date}

    ## 今日评分数据

    {scoring_summary}

    ## 决策任务

    基于以上评分数据，做出以下编辑决策。

    **在决策之前，请主动调用工具获取必要上下文**：
    - 调用 `get_topic_history`（days=7）查看近 7 天话题，避免头条雷同
    - 调用 `get_style_guidance` 查看近期应避免的重复表达
    - 对有疑问的话题，调用 `search_prev_reports` 确认是否已深度报道过

    决策项目：

    1. **信号强度**：判断今日是重大变化日(red)、常规更新日(yellow)还是平静日(green)
       - red: 有突破性项目（星数日增>2000 或 综合评分≥9）或重大行业事件
       - yellow: 有值得关注的趋势但无突破性变化
       - green: 数据平淡，以常规追踪为主

    2. **头条选择**：从评分最高的项目或新闻中选定一条作为头条
       - 优先选有信息差的内容（读者可能不知道但应该知道的）
       - 说明选择理由和建议的叙事角度
       - 查询 `get_topic_history` 后，避免选择近期 Kill List 中的内容

    3. **角度分配**：为每个推荐项目和新闻分配写作角度
       - 可用角度：痛点切入、成本切入、规模切入、对比切入
       - 相邻项目不要用相同角度

    4. **排除清单**：列出不值得写入日报的内容及原因
       - 排除标准：信息密度低、近期已重复报道、无实质技术内容
       - 查询工具后，将重复话题加入排除清单（除非有重大新进展）

    5. **今日一句话**：不超过 20 字的判断句，让读者产生"我得看看怎么回事"的冲动
       - 参考 `get_style_guidance` 后，避免与近期已有句式雷同

  expected_output: >
    返回符合 EditorialPlan 模型的结构化结果，
    包含 signal_strength、headline、repo_angles、news_angles、kill_list、today_hook。
  agent: editorial_planner
