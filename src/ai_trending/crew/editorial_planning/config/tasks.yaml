plan_editorial_task:
  description: >
    # 编辑部选题规划

    当前日期：{current_date}

    ## 今日评分数据

    {scoring_summary}

    ## 今日原始新闻数据（用于共振检测）

    {news_data}

    ## 决策任务

    基于以上评分数据，做出以下编辑决策。

    **在决策之前，请主动调用工具获取必要上下文**：
    - 调用 `get_topic_history`（days=7）查看近 7 天话题，避免头条雷同
    - 调用 `get_style_guidance` 查看近期应避免的重复表达
    - 对有疑问的话题，调用 `search_prev_reports` 确认是否已深度报道过

    决策项目：

    1. **信号强度**：判断今日是重大变化日(red)、常规更新日(yellow)还是平静日(green)
       - red: 有突破性项目（星数日增>2000 或 综合评分≥9）或重大行业事件
       - yellow: 有值得关注的趋势但无突破性变化
       - green: 数据平淡，以常规追踪为主

    2. **头条选择**：从评分最高的项目或新闻中选定一条作为头条
       - 优先选有信息差的内容（读者可能不知道但应该知道的）
       - 说明选择理由和建议的叙事角度
       - 查询 `get_topic_history` 后，避免选择近期 Kill List 中的内容

    3. **角度分配**：为每个推荐项目和新闻分配写作角度
       - 可用角度：痛点切入、成本切入、规模切入、对比切入
       - 相邻项目不要用相同角度

    4. **排除清单**：列出不值得写入日报的内容及原因
       - 排除标准：信息密度低、近期已重复报道、无实质技术内容
       - 查询工具后，将重复话题加入排除清单（除非有重大新进展）

    5. **今日一句话**：不超过 20 字的判断句，让读者产生"我得看看怎么回事"的冲动
       - 调用 `get_style_guidance` 后，**必须**列出近 7 天的「今日一句话」历史
       - 逐条对比，说明本次输出与历史的差异点（主题、句式、视角至少有一项不同）
       - 若相似度过高（如同样是泛化的"AI技术持续演进"类表达），**强制重写**，直到差异明确

    6. **Kill List 验证**（输出前必须执行）：
       - 列出 `get_topic_history` 返回的 Kill List 中所有条目
       - 逐条检查：本次「今日一句话」和「头条」是否与 Kill List 中任一条目语义重叠
       - 在 `kill_list_check` 字段中记录检查结果，格式：
         "已检查 N 条 Kill List 条目：[条目1] ✅ 无冲突 / ❌ 冲突（已替换为...）"
       - 若有冲突，**必须替换**后再输出，不得直接输出冲突内容

    7. **共振检测**（输出 resonance_signals 字段）：
       - 对比「今日原始新闻数据」中的新闻关键词与「今日评分数据」中的项目关键词
       - 找出同时出现在新闻标题和项目名称/描述中的共同关键词
       - 共振强度规则：
         - strong：同一关键词在 ≥2 条新闻中出现，且对应 ≥1 个项目
         - moderate：同一关键词在 1 条新闻中出现，且对应 ≥1 个项目
       - 在 `resonance_signals` 字段中输出共振信号列表，每条包含：
         - keyword: 触发共振的关键词
         - repo_names: 与该关键词相关的项目名称列表
         - news_titles: 与该关键词相关的新闻标题列表
         - strength: "strong" 或 "moderate"
       - 若无共振信号，输出空列表 []

  expected_output: >
    返回符合 EditorialPlan 模型的结构化结果，
    包含 signal_strength、headline、repo_angles、news_angles、kill_list、today_hook、kill_list_check、resonance_signals。
  agent: editorial_planner
