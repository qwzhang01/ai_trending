filter_news_task:
  description: >
    当前日期: {current_date}

    下面是从多个来源抓取到的最近几天 AI / 大模型 / AI Agent 相关新闻原始数据：
    {raw_data}

    请你从中筛选出最有价值的 8 条新闻，并完成去重与合并：
    1. 优先保留真正有事件增量的新闻，例如模型发布、能力升级、基础设施变化、开源项目发布、融资与战略动作。
    2. 排除纯观点、预测、转述、标题党、缺少事实细节的内容。
    3. 同一事件如果来自多个来源，只保留最重要的一条。
    4. 优先保留最近几天内发生且仍有现实影响的新闻。
    5. 输出按重要性从高到低排序。

    类别标签只能是以下之一：
    `大厂动态` `技术突破` `开源生态` `投融资` `行业观察`
  expected_output: >
    只输出最终结果，不要输出解释文字。格式必须严格如下：

    **[类别标签]** [新闻标题]
    > [一句话判断：这件事的实质是什么，对行业有什么影响，不超过35字]
    来源: [来源名] | [链接]
  agent: news_analyst