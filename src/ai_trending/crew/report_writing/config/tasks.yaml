write_report_task:
  description: >
    根据以下数据，撰写一份 {current_date} 的 AI 日报。

    【GitHub 热点数据】
    {github_data}

    【AI 新闻数据】
    {news_data}

    【结构化评分结果（JSON）】
    {scoring_result}

    ===== 输出格式（必须严格遵守，不得改动任何 Section 标题和 Emoji）=====

    # 🤖 AI 日报 · {current_date}

    > [今日导语：1句话，直接说今天最值得关注的结论，有数据支撑，不超过40字]

    ---

    ## 🔥 GitHub 热点项目

    [3-5 个项目，每个项目严格按以下格式，不得增减字段，每个项目之间必须有空行]

    ### [序号]. [[项目名]]([GitHub URL]) ⭐ [star数]

    **[一句话核心价值，不超过 25 字]**

    - 🏷️ **类别**：[从以下选一个：推理框架 / Agent 框架 / 多模态 / 开发工具 / 数据处理 / 模型微调 / 评测基准 / 应用集成]
    - 💻 **语言**：[主要编程语言]
    - 📈 **趋势信号**：[为什么现在值得关注，不超过 35 字，必须是判断句]
    - 🔗 **链接**：[GitHub URL]

    ---

    ## 📰 AI 热点新闻

    [6-8 条新闻，每条严格按以下格式，每条新闻之间必须有空行]

    **[[类别标签]]** [新闻标题（保留原文，不改写）]
    > [一句话判断：这件事的实质是什么，对行业有什么影响，不超过 35 字]
    来源：[来源名] | [[链接文字]]([URL])

    [类别标签只能是：大厂动态 / 技术突破 / 开源生态 / 投融资 / 行业观察 / 产品发布 / 政策监管]

    ---

    ## 🧭 趋势洞察

    [3-5 条，每条格式如下]

    - **[趋势关键词（3-6字）]**：[具体判断，不超过 55 字，必须有数据或对比支撑]

    ---

    *数据时间：{current_date} | 由 AI Agent 自动生成*

    ===== 写作约束（违反任何一条均视为输出不合格）=====

    1. 只收录评分数据中真实存在的 GitHub 项目，绝不虚构项目名称、Star 数或链接
    2. 新闻标题保留原文，不改写，不翻译
    3. 禁止使用：重磅、震撼、颠覆、革命性、划时代、里程碑、历史性、强烈推荐、必看、不容错过
    4. 禁止使用感叹号（！或!）
    5. 每个 GitHub 项目的「核心价值」不超过 25 字，「趋势信号」不超过 35 字
    6. 每条新闻的「一句话判断」不超过 35 字，必须是判断句（说明影响），不是描述句
    7. 趋势洞察每条不超过 55 字，必须有具体数据或对比，不能是空洞的方向描述
    8. 总字数控制在 700-1500 字
    9. 输出纯 Markdown，不包含任何解释性文字、前言或后记

  expected_output: >
    返回一个符合 ReportOutput 模型的结构化结果。
    content 字段包含完整的 AI 日报 Markdown 文本，包含四个 Section：
    标题导语（含 > 导语行）、GitHub 热点项目（3-5个，含完整字段）、
    AI 热点新闻（6-8条，含类别标签和一句话判断）、趋势洞察（3-5条）。
    总字数 700-1500 字，无禁用词，无感叹号。
    validation_issues 字段为空列表（表示通过格式校验）。
  agent: report_writer
