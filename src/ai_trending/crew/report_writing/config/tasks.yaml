write_report_task:
  description: >
    # 编辑决策（由主编确定，请严格执行）

    {editorial_plan}

    ---

    # 风格记忆

    {style_guidance}

    ---

    # 写作简报

    {writing_brief}

    当前日期：{current_date}

    上期回顾追踪数据：{previous_report_context}

    原始数据（补充参考）：
    GitHub: {github_data}
    新闻: {news_data}
    评分 JSON: {scoring_result}

    # 写作要求

    按照编辑决策撰写日报。信号强度、头条选择、写作角度均由主编决定，你只需专注于：
    1. 用编辑决策中指定的信号强度（不要自行判断）
    2. 用编辑决策中指定的项目作为头条（不要更换）
    3. 按编辑决策分配的角度来写每个项目/新闻（不要全用同一角度）
    4. Kill List 中的内容不写入日报
    5. 用编辑决策中的「今日一句话」（可微调措辞，但保留核心判断）

    如果编辑决策为空或不可用，则自行决定以上要素。

    ## 质量标准

    1. 每段话必须回答"这对读者意味着什么"，用叙事语言讲数据，不填表格
    2. 只使用真实数据，不编造项目名、Star 数、链接或统计数字
    3. 直接使用简报中提供的 story_hook、so_what_analysis 和 suggested_angle
    4. 禁止使用：重磅、震撼、颠覆、革命性、划时代、里程碑、强烈推荐、必看、感叹号
    5. 总字数 800-2000 字，输出纯 Markdown

    ## 段落示例（参考风格，不要照搬）

    头条示例：
    > Anthropic 发布 Claude Code — 终端里的 AI 编程搭档。与 Cursor 这类 IDE 插件不同，
    > Claude Code 直接跑在终端中，用自然语言操作文件系统和 git。发布 48 小时内
    > GitHub 星数突破 8000，HN 讨论帖超过 500 条回复。如果你日常用 vim + terminal
    > 开发，这个工具值得在这周试一下。

    项目示例（痛点切入）：
    > 一句话：让 LLM 在 Mac 上跑起来不再头疼。针对 Metal 后端重写了推理内核，
    > 实测吞吐量高出同类 40%。发布仅 1 个月星数突破 6k，如果你在做本地推理，值得跟进。

    新闻 So What 示例：
    > **[So What]** 推理成本降低 50% 意味着中小团队也能用上 GPT-4 级别能力，这是 AI 应用普及的关键拐点

    # 七段式输出结构

    # AI 日报 · {current_date}

    **[今日信号强度]** [使用编辑决策中的信号强度]

    > **[今日一句话]** [使用编辑决策中的今日一句话]

    ---

    ## 今日头条

    ### [编辑决策指定的头条项目](URL) ⭐ star数（+增长）

    [150-200 字叙事段落：用编辑决策指定的角度，包含信息差悬念 + 技术细节 + 谁应该关注]

    ---

    ## GitHub 热点项目

    [2-4 个项目，每个 60-80 字。按编辑决策分配的角度来写（不在 Kill List 中的项目）。
    星数格式：⭐ star数（+本周增长）]

    ---

    ## AI 热点新闻

    [4-6 条新闻（不在 Kill List 中的），每条严格 3 行，行间必须有换行：]
    **[🟢 一手信源 / 🟡 社区讨论 / 🔴 待验证]** **[类别标签]** 新闻标题
    > **[So What]** 深层分析（直接使用简报中 so_what_analysis）
    来源：来源名 | [链接](URL)

    [类别标签：大厂动态/技术突破/开源生态/投融资/行业观察/产品发布/政策监管]

    ---

    ## 趋势洞察

    [3-5 条，格式：- **趋势判断句**：具体分析，含数据支撑，结尾指出"但是"限制条件]

    ---

    ## 本周行动建议

    ### 本周作业
    **具体任务** [可执行任务]
    **预期收获** [完成后价值]
    **时间投入** [建议时间]
    **时效理由** [为什么是这周]

    ### 讨论问题
    **核心议题** [思考问题]
    **思考角度** [思考框架]
    **参与方式** [如何参与]

    ---

    ## 上期回顾

    [有追踪数据时：星数追踪 + 趋势验证 + 下周关注点。无数据时省略整个 Section]

    ---

    *本报告由Github开源项目 [ai_trending](https://github.com/qwzhang01/ai_trending)
    自动生成，欢迎 Star & Fork*

    *数据截至：{current_date} | 数据来源：GitHub、Hacker News、Reddit 等公开渠道，仅供参考*

  expected_output: >
    返回符合 ReportOutput 模型的结构化结果。
    content 字段为完整 Markdown 日报，800-2000 字，七段式结构，无禁用词，无感叹号。
    信号强度、头条选择、写作角度必须与编辑决策一致。Kill List 中的内容不出现在日报中。
    validation_issues 为空列表。
  agent: report_writer
